name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ci-

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run smoke tests
        # Excludes tests that require sentence-transformers, Ollama, or a live DB.
        # Full suite: pytest tests/ --ignore=tests/test_question_battery.py
        run: |
          python -m pytest tests/ -x -q \
            --ignore=tests/test_question_battery.py \
            --ignore=tests/test_rag_harness.py \
            --ignore=tests/test_intent_classifier.py \
            -k "not sentence_transformers" \
            --tb=short
