name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-timeout

      - name: Run tests (no Ollama required)
        # Excludes test_question_battery.py which queries the live DB via Ollama embeddings.
        # All other tests use mocked LLM calls or the hashing/test embed backend.
        # TRANSFORMERS_OFFLINE prevents HuggingFace model downloads; intent classifier falls back to heuristics.
        env:
          TRANSFORMERS_OFFLINE: "1"
          HF_DATASETS_OFFLINE: "1"
        run: |
          python -m pytest tests/ -x -q \
            --ignore=tests/test_question_battery.py \
            --timeout=60 \
            --tb=short
